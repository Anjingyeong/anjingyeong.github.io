<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <title>실시간 이벤트와 증거 이벤트를 originalEventId 기준 하나의 사고로 병합한 전후 비교</title>
  <desc>실시간 경보와 증거 데이터를 하나의 Incident로 병합한 데이터 정합성 개선 전후 비교 다이어그램</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <marker id="arrowRed" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#F87171"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#60A5FA"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#34D399"/>
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="1600" height="900" rx="20" fill="url(#bgGrad)" stroke="#334155" stroke-width="2"/>

  <!-- Main Title -->
  <text x="800" y="75" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="800">
    동일 사고 중복 방지 및 Incident 병합 구조
  </text>

  <!-- SECTION 1: BEFORE (Left Panel) -->
  <g transform="translate(60, 130)">
    <rect width="440" height="710" rx="16" fill="#18181B" stroke="#EF4444" stroke-width="2.5"/>
    
    <!-- Section Title -->
    <rect x="20" y="20" width="400" height="60" rx="10" fill="#7F1D1D"/>
    <text x="220" y="58" text-anchor="middle" fill="#FCA5A5" font-family="system-ui, sans-serif" font-size="28" font-weight="800">
      Before · 이벤트 분리
    </text>

    <!-- Event 1 Box -->
    <g transform="translate(30, 110)">
      <rect width="380" height="125" rx="12" fill="#27272A" stroke="#F87171" stroke-width="2"/>
      <text x="25" y="45" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="24" font-weight="700">실시간 경보</text>
      <text x="25" y="85" fill="#FCA5A5" font-family="monospace" font-size="22">eventId = fall-001</text>
    </g>

    <!-- Arrow Down -->
    <line x1="220" y1="245" x2="220" y2="275" stroke="#F87171" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrowRed)"/>

    <!-- Event 2 Box -->
    <g transform="translate(30, 285)">
      <rect width="380" height="125" rx="12" fill="#27272A" stroke="#F87171" stroke-width="2"/>
      <text x="25" y="45" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="24" font-weight="700">증거 이벤트</text>
      <text x="25" y="85" fill="#FCA5A5" font-family="monospace" font-size="22">eventId = clip-001</text>
    </g>

    <!-- Result Warning Box -->
    <g transform="translate(30, 445)">
      <rect width="380" height="230" rx="14" fill="#451A03" stroke="#F97316" stroke-width="2.5"/>
      <text x="190" y="50" text-anchor="middle" fill="#FDBA74" font-family="system-ui, sans-serif" font-size="26" font-weight="800">결과: 사고 카드 2개</text>
      <line x1="20" y1="75" x2="360" y2="75" stroke="#78350F" stroke-width="2"/>
      <text x="190" y="125" text-anchor="middle" fill="#FFEDD5" font-family="system-ui, sans-serif" font-size="22" font-weight="600">DB &amp; 관제 화면 중복 생성</text>
      <text x="190" y="175" text-anchor="middle" fill="#FDBA74" font-family="system-ui, sans-serif" font-size="22">사고 정보 파편화 발생</text>
    </g>
  </g>

  <!-- SECTION 2: PROCESS (Middle Panel) -->
  <g transform="translate(560, 130)">
    <rect width="480" height="710" rx="16" fill="#1E1B4B" stroke="#6366F1" stroke-width="2.5"/>

    <!-- Section Title -->
    <rect x="20" y="20" width="440" height="60" rx="10" fill="#312E81"/>
    <text x="240" y="58" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, sans-serif" font-size="28" font-weight="800">
      Process · 병합 처리
    </text>

    <!-- Core Identifier Box -->
    <g transform="translate(30, 110)">
      <rect width="420" height="150" rx="14" fill="#0F172A" stroke="#818CF8" stroke-width="2"/>
      <text x="210" y="55" text-anchor="middle" fill="#A5B4FC" font-family="system-ui, sans-serif" font-size="26" font-weight="800">originalEventId 기준 병합</text>
      <text x="210" y="105" text-anchor="middle" fill="#E0E7FF" font-family="monospace" font-size="22">key = "fall-001"</text>
    </g>

    <!-- Sub-Description Item 1 (Backend) -->
    <g transform="translate(30, 290)">
      <rect width="420" height="175" rx="14" fill="#0F172A" stroke="#4F46E5" stroke-width="2"/>
      <rect x="20" y="20" width="120" height="40" rx="6" fill="#312E81"/>
      <text x="80" y="47" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Backend</text>
      <text x="20" y="100" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="600">기존 Incident에 미디어 연결</text>
      <text x="20" y="140" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="20">S3 영상 클립 &amp; 스냅샷 URL 바인딩</text>
    </g>

    <!-- Sub-Description Item 2 (Frontend) -->
    <g transform="translate(30, 495)">
      <rect width="420" height="175" rx="14" fill="#0F172A" stroke="#4F46E5" stroke-width="2"/>
      <rect x="20" y="20" width="130" height="40" rx="6" fill="#312E81"/>
      <text x="85" y="47" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Frontend</text>
      <text x="20" y="100" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="600">WebSocket·REST 상태 병합</text>
      <text x="20" y="140" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="20">관제자 확인(Ack) 상태 보존 및 갱신</text>
    </g>
  </g>

  <!-- SECTION 3: AFTER (Right Panel) -->
  <g transform="translate(1090, 130)">
    <rect width="450" height="710" rx="16" fill="#064E3B" stroke="#10B981" stroke-width="2.5"/>

    <!-- Section Title -->
    <rect x="20" y="20" width="410" height="60" rx="10" fill="#065F46"/>
    <text x="225" y="58" text-anchor="middle" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="28" font-weight="800">
      After · 통합 완료
    </text>

    <!-- Unified Card Container -->
    <g transform="translate(25, 100)">
      <rect width="400" height="580" rx="16" fill="#0F172A" stroke="#34D399" stroke-width="2.5"/>
      
      <rect x="15" y="15" width="370" height="65" rx="10" fill="#047857"/>
      <text x="200" y="56" text-anchor="middle" fill="#ECFDF5" font-family="system-ui, sans-serif" font-size="28" font-weight="800">사고 카드 1개</text>

      <line x1="20" y1="100" x2="380" y2="100" stroke="#1E293B" stroke-width="2"/>
      
      <text x="30" y="140" fill="#A7F3D0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">포함 항목:</text>

      <!-- Checklist Items -->
      <g transform="translate(30, 175)">
        <circle cx="16" cy="12" r="10" fill="#10B981"/>
        <path d="M 11 12 L 15 16 L 22 8" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
        <text x="40" y="20" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="24" font-weight="600">실시간 경보</text>
      </g>

      <g transform="translate(30, 245)">
        <circle cx="16" cy="12" r="10" fill="#10B981"/>
        <path d="M 11 12 L 15 16 L 22 8" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
        <text x="40" y="20" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="24" font-weight="600">확인 상태</text>
      </g>

      <g transform="translate(30, 315)">
        <circle cx="16" cy="12" r="10" fill="#10B981"/>
        <path d="M 11 12 L 15 16 L 22 8" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
        <text x="40" y="20" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="24" font-weight="600">스냅샷</text>
      </g>

      <g transform="translate(30, 385)">
        <circle cx="16" cy="12" r="10" fill="#10B981"/>
        <path d="M 11 12 L 15 16 L 22 8" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
        <text x="40" y="20" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="24" font-weight="600">사고 클립</text>
      </g>

      <g transform="translate(30, 455)">
        <circle cx="16" cy="12" r="10" fill="#10B981"/>
        <path d="M 11 12 L 15 16 L 22 8" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
        <text x="40" y="20" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="24" font-weight="600">VLM 설명</text>
      </g>
    </g>
  </g>

  <!-- FLOW CONNECTORS -->
  <line x1="500" y1="485" x2="560" y2="485" stroke="#F87171" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="1040" y1="485" x2="1090" y2="485" stroke="#34D399" stroke-width="4" marker-end="url(#arrowGreen)"/>
</svg>
